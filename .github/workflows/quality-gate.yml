name: 全量质量检查

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: 质量门禁检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 检查文档链接
        run: pnpm run validate:links
        continue-on-error: false

      - name: 检查类型定义
        run: pnpm run validate:types
        continue-on-error: false

      - name: ESLint 检查
        run: pnpm run lint
        continue-on-error: false

      - name: Prettier 格式检查
        run: pnpm run format:check
        continue-on-error: false

      - name: 生成质量报告
        run: |
          echo "## 质量检查报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 所有质量检查通过！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 文档链接检查：通过" >> $GITHUB_STEP_SUMMARY
          echo "- 类型定义检查：通过" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint 检查：通过" >> $GITHUB_STEP_SUMMARY
          echo "- Prettier 格式检查：通过" >> $GITHUB_STEP_SUMMARY
