version: '1.0'
name: pr-pipeline-v2
displayName: PRPipeline
triggers:
  pr:
    branches:
      include:
        - master
stages:
  - name: check
    displayName: 类型检查
    strategy: naturally
    trigger: auto
    steps:
      - step: bash
        name: secret_scan
        displayName: 敏感信息检测
        commands:
          - bash scripts/check-secrets.sh --ci-pr origin/master
      - step: build@nodejs
        name: typecheck
        displayName: TypeScript 类型检查
        nodeVersion: 22.3.0
        commands:
          - npm install -g pnpm@10.14.0
          - pnpm install --frozen-lockfile --config.node-linker=hoisted
          - pnpm --filter moyan-mfw-base build
          - pnpm --filter moyan-mfw-business-dict build
          - pnpm --filter moyan-mfw-extension-ad build
          - pnpm run typecheck
