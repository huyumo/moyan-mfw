version: '1.0'
name: tag-pipeline-v2
displayName: TagPipeline
triggers:
  trigger: auto
  push:
    tags:
      prefix:
        - v
variables:
  global:
    - NPM_TOKEN
stages:
  - name: release
    displayName: 构建并发布
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_and_publish
        displayName: 类型检查、构建与发布
        nodeVersion: 22.3.0
        commands:
          - set -e
          - npm install -g pnpm@10.14.0
          - pnpm install --frozen-lockfile --config.node-linker=hoisted
          - pnpm --filter moyan-mfw-base build
          - pnpm --filter moyan-mfw-business-dict build
          - pnpm --filter moyan-mfw-extension-ad build
          - pnpm --filter moyan-mfw-extension-config build
          - pnpm --filter moyan-mfw-cli build
          - pnpm run typecheck
          - VERSION=$(node -p "require('./package.json').version")
          - echo ">>> 发布版本：v${VERSION}"
          - npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          - cd packages/base && npm publish --access public
          - cd ../extensions/extension-ad && npm publish --access public
          - cd ../extension-config && npm publish --access public
          - cd ../../cli && npm publish --access public
          - echo "✅ v${VERSION} 所有包发布完成！"
