version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - .*
      exclude:
        - master
    tags:
      prefix:
        - v
variables:
  global:
    - NPM_TOKEN
stages:
  - name: check
    displayName: 类型检查
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: typecheck
        displayName: TypeScript 类型检查
        nodeVersion: 22.3.0
        commands:
          - npm install -g pnpm@10.14.0
          - pnpm install --frozen-lockfile --config.node-linker=hoisted
          - pnpm run typecheck
  - name: build
    displayName: 构建
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_packages
        displayName: 构建可发布包
        nodeVersion: 22.3.0
        commands:
          - npm install -g pnpm@10.14.0
          - pnpm install --frozen-lockfile --config.node-linker=hoisted
          - pnpm --filter moyan-mfw-base build
          - pnpm --filter moyan-mfw-extension-ad build
          - pnpm --filter moyan-mfw-cli build
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./packages/base/src/backend/dist
              - ./packages/base/src/frontend/dist
              - ./packages/base/src/shared/dist
              - ./packages/extensions/extension-ad/src/backend/dist
              - ./packages/extensions/extension-ad/src/frontend/dist
              - ./packages/extensions/extension-ad/src/shared/dist
              - ./packages/cli/dist
              - ./packages/cli/dist/templates
  - name: publish
    displayName: 发布到 npm
    strategy: naturally
    trigger: manual
    steps:
      - step: build@nodejs
        name: npm_publish
        displayName: npm 发布
        nodeVersion: 22.3.0
        commands:
          - npm install -g pnpm@10.14.0
          - pnpm install --frozen-lockfile --config.node-linker=hoisted
          - VERSION=$(node -p "require('./package.json').version")
          - echo ">>> 当前版本：v${VERSION}"
          - npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          - cd packages/base && npm publish --access public
          - cd ../extensions/extension-ad && npm publish --access public
          - cd ../../cli && npm publish --access public
          - echo "✅ 所有包发布完成！"
