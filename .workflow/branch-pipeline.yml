version: '1.0'
name: branch-pipeline-v2
displayName: BranchPipeline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - .*
stages:
  - name: check_and_build
    displayName: 类型检查 + 构建
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: typecheck_and_build
        displayName: TypeScript 类型检查与构建
        nodeVersion: 22.3.0
        commands:
          - npm install -g pnpm@10.14.0
          - pnpm install --frozen-lockfile --config.node-linker=hoisted
          - pnpm --filter moyan-mfw-base build
          - pnpm --filter moyan-mfw-business-dict build
          - pnpm --filter moyan-mfw-extension-ad build
          - pnpm --filter moyan-mfw-cli build
          - pnpm run typecheck
