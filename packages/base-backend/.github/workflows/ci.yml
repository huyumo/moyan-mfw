# GitHub Actions CI/CD 配置

name: CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'packages/base-backend/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'packages/base-backend/**'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  # 构建和测试
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: moyan_mfw_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        working-directory: ./packages/base-backend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ./packages/base-backend
        run: pnpm run lint

      - name: Type check
        working-directory: ./packages/base-backend
        run: pnpm exec tsc --noEmit

      - name: Test
        working-directory: ./packages/base-backend
        run: pnpm run test:cov
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: moyan_mfw_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build
        working-directory: ./packages/base-backend
        run: pnpm run build

  # Docker 构建
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./packages/base-backend
          file: ./packages/base-backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/moyan-mfw-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/moyan-mfw-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/moyan-mfw-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/moyan-mfw-backend:buildcache,mode=max

  # 部署（示例：部署到 Kubernetes）
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout restart deployment/moyan-mfw-backend

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/moyan-mfw-backend --timeout=300s
