<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E2eVerify</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('mfw:base-frontend:layout-preferences');
          if (raw) {
            var prefs = JSON.parse(raw);
            if (prefs && prefs.styleConfig) {
              var styleConfig = prefs.styleConfig;
              if (styleConfig.colorMode === 'dark') {
                document.documentElement.classList.add('dark');
                var placeholder = document.getElementById('loading-placeholder');
                if (placeholder) {
                  placeholder.setAttribute('data-dark', 'true');
                }
              }
              var themeThemes = {
                default: {
                  primary: '#409eff',
                  success: '#67c23a',
                  warning: '#e6a23c',
                  danger: '#f56c6c',
                  info: '#909399',
                },
                ocean: {
                  primary: '#00a8cc',
                  success: '#52c41a',
                  warning: '#faad14',
                  danger: '#ff4d4f',
                  info: '#8c8c8c',
                },
                graphite: {
                  primary: '#5a5a5a',
                  success: '#4a9c6d',
                  warning: '#c9a227',
                  danger: '#c45656',
                  info: '#73767a',
                },
                fintech: {
                  primary: '#F59E0B',
                  success: '#22C55E',
                  warning: '#FBBF24',
                  danger: '#EF4444',
                  info: '#8B5CF6',
                },
                tech: {
                  primary: '#8B5CF6',
                  success: '#10B981',
                  warning: '#FBBF24',
                  danger: '#F43F5E',
                  info: '#6366F1',
                },
                luxury: {
                  primary: '#CA8A04',
                  success: '#4ADE80',
                  warning: '#FBBF24',
                  danger: '#F87171',
                  info: '#A8A29E',
                },
                nature: {
                  primary: '#059669',
                  success: '#22C55E',
                  warning: '#FBBF24',
                  danger: '#EF4444',
                  info: '#14B8A6',
                },
                aurora: {
                  primary: '#7c3aed',
                  success: '#10b981',
                  warning: '#f59e0b',
                  danger: '#ef4444',
                  info: '#6b7280',
                  gradient: 'linear-gradient(135deg, #3b82f6 0%, #7c3aed 50%, #ec4899 100%)',
                },
                sunset: {
                  primary: '#f97316',
                  success: '#22c55e',
                  warning: '#eab308',
                  danger: '#dc2626',
                  info: '#78716c',
                  gradient: 'linear-gradient(135deg, #fbbf24 0%, #f97316 50%, #dc2626 100%)',
                },
              };
              var themeName = styleConfig.themePackage || 'default';
              var colors = themeThemes[themeName] || themeThemes['default'];
              if (colors) {
                var root = document.documentElement;
                function hexToRgb(hex) {
                  var c = hex.replace('#', '');
                  return [
                    parseInt(c.substring(0, 2), 16),
                    parseInt(c.substring(2, 4), 16),
                    parseInt(c.substring(4, 6), 16),
                  ];
                }
                function rgbToHex(r, g, b) {
                  var h = function (n) {
                    var s = Math.round(Math.max(0, Math.min(255, n))).toString(16);
                    return s.length === 1 ? '0' + s : s;
                  };
                  return '#' + h(r) + h(g) + h(b);
                }
                function mixWhite(color, level) {
                  var rgb = hexToRgb(color);
                  var ratio = level / 10;
                  return rgbToHex(
                    Math.round(255 * ratio + rgb[0] * (1 - ratio)),
                    Math.round(255 * ratio + rgb[1] * (1 - ratio)),
                    Math.round(255 * ratio + rgb[2] * (1 - ratio)),
                  );
                }
                function mixBlack(color, level) {
                  var rgb = hexToRgb(color);
                  var ratio = level / 10;
                  return rgbToHex(
                    Math.round(rgb[0] * (1 - ratio)),
                    Math.round(rgb[1] * (1 - ratio)),
                    Math.round(rgb[2] * (1 - ratio)),
                  );
                }
                var lightLevels = [3, 5, 7, 8, 9];
                var darkLevels = [2];
                Object.keys(colors).forEach(function (key) {
                  var value = colors[key];
                  if (key === 'gradient') {
                    root.style.setProperty('--el-color-primary-gradient', value);
                    root.style.setProperty('--mfw-gradient-primary', value);
                    root.classList.add('mfw-theme-gradient');
                    return;
                  }
                  root.style.setProperty('--el-color-' + key, value);
                  lightLevels.forEach(function (level) {
                    root.style.setProperty(
                      '--el-color-' + key + '-light-' + level,
                      mixWhite(value, level),
                    );
                  });
                  darkLevels.forEach(function (level) {
                    root.style.setProperty(
                      '--el-color-' + key + '-dark-' + level,
                      mixBlack(value, level),
                    );
                  });
                });
              }
            }
          }
        } catch (e) {
          console.warn('[Loading] Failed to read preferences:', e);
        }
      })();
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      #loading-placeholder {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffffff 0%, #f8fafc 50%, #ffffff 100%);
        z-index: 9999;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
        overflow: hidden;
      }

      #loading-placeholder[data-dark='true'] {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      }

      #loading-placeholder.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loading-particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(59, 130, 246, 0.4);
        border-radius: 50%;
        animation: float-particle linear infinite;
      }

      #loading-placeholder[data-dark='true'] .particle {
        background: rgba(59, 130, 246, 0.6);
      }

      .particle:nth-child(1) {
        left: 10%;
        animation-duration: 8s;
        animation-delay: 0s;
      }
      .particle:nth-child(2) {
        left: 20%;
        animation-duration: 10s;
        animation-delay: 1s;
      }
      .particle:nth-child(3) {
        left: 30%;
        animation-duration: 7s;
        animation-delay: 2s;
      }
      .particle:nth-child(4) {
        left: 40%;
        animation-duration: 9s;
        animation-delay: 0.5s;
      }
      .particle:nth-child(5) {
        left: 50%;
        animation-duration: 11s;
        animation-delay: 1.5s;
      }
      .particle:nth-child(6) {
        left: 60%;
        animation-duration: 8s;
        animation-delay: 3s;
      }
      .particle:nth-child(7) {
        left: 70%;
        animation-duration: 10s;
        animation-delay: 2.5s;
      }
      .particle:nth-child(8) {
        left: 80%;
        animation-duration: 7s;
        animation-delay: 0.8s;
      }
      .particle:nth-child(9) {
        left: 90%;
        animation-duration: 9s;
        animation-delay: 1.2s;
      }
      .particle:nth-child(10) {
        left: 15%;
        animation-duration: 12s;
        animation-delay: 2.2s;
      }
      .particle:nth-child(11) {
        left: 25%;
        animation-duration: 8s;
        animation-delay: 0.3s;
      }
      .particle:nth-child(12) {
        left: 35%;
        animation-duration: 10s;
        animation-delay: 1.8s;
      }
      .particle:nth-child(13) {
        left: 45%;
        animation-duration: 7s;
        animation-delay: 3.5s;
      }
      .particle:nth-child(14) {
        left: 55%;
        animation-duration: 9s;
        animation-delay: 0.7s;
      }
      .particle:nth-child(15) {
        left: 65%;
        animation-duration: 11s;
        animation-delay: 2.8s;
      }
      .particle:nth-child(16) {
        left: 75%;
        animation-duration: 8s;
        animation-delay: 1.1s;
      }
      .particle:nth-child(17) {
        left: 85%;
        animation-duration: 10s;
        animation-delay: 3.2s;
      }
      .particle:nth-child(18) {
        left: 95%;
        animation-duration: 7s;
        animation-delay: 0.4s;
      }

      @keyframes float-particle {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-100px) scale(1);
          opacity: 0;
        }
      }

      .loading-core {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loading-ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid transparent;
      }

      .loading-ring-1 {
        width: 120px;
        height: 120px;
        border-top-color: #3b82f6;
        border-right-color: #3b82f6;
        animation: spin-clockwise 1.5s linear infinite;
      }

      .loading-ring-2 {
        width: 90px;
        height: 90px;
        border-bottom-color: #8b5cf6;
        border-left-color: #8b5cf6;
        animation: spin-counter-clockwise 1.2s linear infinite;
      }

      .loading-ring-3 {
        width: 60px;
        height: 60px;
        border-top-color: #06b6d4;
        border-right-color: #06b6d4;
        animation: spin-clockwise 0.9s linear infinite;
      }

      .loading-center {
        width: 30px;
        height: 30px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
        border-radius: 50%;
        animation: pulse-glow 1.5s ease-in-out infinite;
        box-shadow:
          0 0 20px rgba(59, 130, 246, 0.5),
          0 0 40px rgba(139, 92, 246, 0.3),
          0 0 60px rgba(6, 182, 212, 0.2);
      }

      @keyframes spin-clockwise {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-counter-clockwise {
        to {
          transform: rotate(-360deg);
        }
      }

      @keyframes pulse-glow {
        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      .loading-text-container {
        margin-top: 40px;
        text-align: center;
      }

      .loading-text {
        font-family:
          'Segoe UI',
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 16px;
        font-weight: 500;
        color: #1e293b;
        letter-spacing: 2px;
        animation: text-fade 2s ease-in-out infinite;
      }

      #loading-placeholder[data-dark='true'] .loading-text {
        color: #e2e8f0;
      }

      .loading-dots {
        display: inline-block;
        margin-left: 4px;
      }

      .loading-dots span {
        display: inline-block;
        width: 6px;
        height: 6px;
        margin: 0 2px;
        background: #3b82f6;
        border-radius: 50%;
        animation: dot-bounce 1.4s ease-in-out infinite;
      }

      .loading-dots span:nth-child(1) {
        animation-delay: 0s;
      }
      .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes text-fade {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes dot-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
      }

      .loading-progress {
        margin-top: 30px;
        width: 200px;
        height: 3px;
        background: rgba(0, 0, 0, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      #loading-placeholder[data-dark='true'] .loading-progress {
        background: rgba(255, 255, 255, 0.1);
      }

      .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4);
        border-radius: 2px;
        animation: progress-fill 2s ease-in-out infinite;
      }

      @keyframes progress-fill {
        0% {
          width: 0%;
        }
        50% {
          width: 70%;
        }
        100% {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .particle,
        .loading-ring,
        .loading-center,
        .loading-text,
        .loading-dots span,
        .loading-progress-bar {
          animation: none;
        }

        .loading-center {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading-placeholder">
      <div class="loading-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="loading-core">
        <div class="loading-ring loading-ring-1"></div>
        <div class="loading-ring loading-ring-2"></div>
        <div class="loading-ring loading-ring-3"></div>
        <div class="loading-center"></div>
      </div>
      <div class="loading-text-container">
        <div class="loading-text">
          正在加载
          <span class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </div>
      </div>
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('mfw:base-frontend:layout-preferences');
          if (raw) {
            var prefs = JSON.parse(raw);
            if (prefs && prefs.styleConfig && prefs.styleConfig.colorMode === 'dark') {
              var placeholder = document.getElementById('loading-placeholder');
              if (placeholder) {
                placeholder.setAttribute('data-dark', 'true');
              }
            }
          }
        } catch (e) {
          console.warn('[Loading] Failed to read color mode preference:', e);
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
