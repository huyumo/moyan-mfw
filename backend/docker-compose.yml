version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: moyan-backend-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: moyan_mfw
      MYSQL_USER: moyan
      MYSQL_PASSWORD: moyan123456
      TZ: Asia/Shanghai
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - moyan-backend-network

  redis:
    image: redis:7-alpine
    container_name: moyan-backend-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - moyan-backend-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  moyan-backend-network:
    driver: bridge