# Redis 配置文件
# 适用于开发环境，生产环境请根据实际情况调整

# 端口
port 6379

# 绑定地址
bind 0.0.0.0

# 密码（生产环境请修改）
# requirepass your-password-here

# 持久化
appendonly yes
appendfsync everysec

# 最大内存（可选）
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# 日志
loglevel notice

# 客户端超时（秒，0 表示不超时）
timeout 0

# TCP 保活（秒）
tcp-keepalive 300