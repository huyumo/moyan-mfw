---
meta:
  id: ARCH-001
  name: 项目架构规范
  version: 1.0
  source: docs/03-框架规范/02-后端规范/02-项目架构规范.md
  last_updated: 2026-03-31
  priority: MUST

---
categories:
  # 分类 1：分层架构
  - id: LAYER_STRUCTURE
    name: 分层架构规范
    description: 项目必须遵循清晰的分层架构
    rules:
      - id: LAYER-001
        name: 三层架构
        priority: MUST
        type: structure
        target: architecture
        layers:
          - name: Controller
            directory: "src/controllers/"
            description: "处理 HTTP 请求，参数验证，响应格式化"
            can_depend_on: ["Service"]
          - name: Service
            directory: "src/services/"
            description: "业务逻辑处理"
            can_depend_on: ["Repository", "Entity"]
          - name: Repository
            directory: "src/repositories/"
            description: "数据访问层"
            can_depend_on: ["Entity"]
          - name: Entity
            directory: "src/entities/"
            description: "数据实体"
            can_depend_on: []
        message: |
          必须遵循三层架构：Controller → Service → Repository → Entity
          依赖方向不可逆转

      - id: LAYER-002
        name: 禁止跨层依赖
        priority: MUST
        type: ast
        target: import_statement
        forbidden_patterns:
          - "Controller 直接导入 Entity"
          - "Controller 直接导入 Repository"
          - "Service 导入 Controller"
          - "Repository 导入 Service"
        message: "禁止跨层依赖，必须通过规定的依赖方向"
        examples:
          valid:
            - "import { UserService } from '../services/user.service';  // Controller 导入 Service"
            - "import { UserEntity } from '../entities/user.entity';   // Service 导入 Entity"
          invalid:
            - "import { UserEntity } from '../entities/user.entity';  // Controller 直接导入 Entity"
            - "import { UserService } from '../services/user.service'; // Repository 导入 Service"

      - id: LAYER-003
        name: Controller 职责
        priority: MUST
        type: content
        target: controller
        allowed_operations:
          - "参数验证"
          - "调用 Service"
          - "返回响应"
        forbidden_operations:
          - "直接数据库操作"
          - "业务逻辑处理"
          - "实体转换"
        message: |
          Controller 只能负责：参数验证、调用 Service、返回响应
          禁止在 Controller 中直接操作数据库或处理业务逻辑

      - id: LAYER-004
        name: Service 职责
        priority: MUST
        type: content
        target: service
        allowed_operations:
          - "业务逻辑处理"
          - "调用 Repository"
          - "事务管理"
          - "调用其他 Service"
        forbidden_operations:
          - "直接处理 HTTP 请求"
          - "直接返回 HTTP 响应"
        message: |
          Service 负责业务逻辑处理，可调用 Repository 和其他 Service
          禁止在 Service 中处理 HTTP 相关的请求和响应

  # 分类 2：依赖注入
  - id: DEPENDENCY_INJECTION
    name: 依赖注入规范
    description: 使用 NestJS 依赖注入机制
    rules:
      - id: DI-001
        name: 构造函数注入
        priority: MUST
        type: ast
        target: class_constructor
        pattern: "constructor\\(\\s*(?:private|public|protected)\\s+readonly\\s+\\w+"
        message: "必须使用构造函数注入依赖，建议使用 readonly 修饰"
        examples:
          valid:
            - "constructor(private readonly userService: UserService) {}"
            - "constructor(private readonly userRepository: UserRepository) {}"
          invalid:
            - "private userService = new UserService();"
            - "private userService: UserService;"
            - "const userService = Container.get(UserService);"

      - id: DI-002
        name: Service 注册
        priority: MUST
        type: content
        target: module
        pattern: "@Module\\(\\{[\\s\\S]*?providers:\\s*\\[[\\s\\S]*?\\][\\s\\S]*?\\}\\)"
        message: "Service 必须在 Module 的 providers 中注册"
        examples:
          valid: |
            @Module({
              providers: [UserService],
              exports: [UserService],
            })
          invalid: |
            @Module({})  // 未注册 Service

      - id: DI-003
        name: 接口注入
        priority: SHOULD
        type: ast
        target: interface_injection
        pattern: "constructor\\(\\s*private\\s+readonly\\s+\\w+:\\s+I\\w+"
        message: "对于可能变化的依赖，建议使用接口注入"
        examples:
          valid:
            - "constructor(private readonly emailSender: IEmailSender) {}"
          invalid:
            - "constructor(private readonly emailSender: EmailSender) {}"

      - id: DI-004
        name: 禁止实例化依赖
        priority: MUST
        type: regex
        target: instantiation
        pattern: "=\\s*new\\s+(?:\\w+Service|\\w+Repository|\\w+Dao)"
        negative: true
        message: "禁止使用 new 关键字实例化 Service、Repository 等依赖"
        examples:
          valid:
            - "constructor(private readonly userService: UserService) {}"
          invalid:
            - "private userService = new UserService();"
            - "const service = new UserService();"

  # 分类 3：模块划分
  - id: MODULE_DESIGN
    name: 模块划分规范
    description: 按业务模块组织代码
    rules:
      - id: MOD-001
        name: 模块目录结构
        priority: SHOULD
        type: structure
        target: module_directory
        pattern: "src/modules/[a-z]+(-[a-z]+)*/"
        message: "业务模块应放在 src/modules/ 目录下，使用 kebab-case 命名"
        examples:
          valid:
            - "src/modules/user-management/"
            - "src/modules/auth/"
          invalid:
            - "src/modules/UserManagement/"
            - "src/modules/user_management/"

      - id: MOD-002
        name: 模块内聚
        priority: SHOULD
        type: structure
        target: module_cohesion
        required_files:
          - "*.module.ts"
          - "*.controller.ts"
          - "*.service.ts"
          - "dto/*.dto.ts"
          - "vo/*.vo.ts"
        message: "每个业务模块应包含完整的 MVC 结构"

      - id: MOD-003
        name: 模块依赖
        priority: MUST
        type: content
        target: module_import
        pattern: "imports:\\s*\\[[\\s\\S]*?\\]"
        message: "模块依赖必须在 @Module 装饰器的 imports 中显式声明"
        examples:
          valid: |
            @Module({
              imports: [TypeOrmModule.forFeature([UserEntity]), AuthModule],
            })
          invalid: |
            @Module({})  // 未声明模块依赖

      - id: MOD-004
        name: 循环依赖禁止
        priority: MUST
        type: structure
        target: circular_dependency
        forbidden: true
        message: "禁止模块间循环依赖，可通过抽象模块或共享模块解决"
        examples:
          valid:
            - "AuthModule → SharedModule → UserModule (无循环)"
          invalid:
            - "AuthModule → UserModule → AuthModule (循环依赖)"

  # 分类 4：异常处理
  - id: EXCEPTION_HANDLING
    name: 异常处理规范
    description: 统一的异常处理机制
    rules:
      - id: EXC-001
        name: 自定义异常基类
        priority: MUST
        type: ast
        target: exception_class
        pattern: "extends\\s+HttpException"
        message: "自定义异常类必须继承 HttpException"
        examples:
          valid:
            - "export class UserNotFoundError extends HttpException {}"
          invalid:
            - "export class UserNotFoundError extends Error {}"
            - "class UserNotFoundError {}"

      - id: EXC-002
        name: 异常抛出
        priority: MUST
        type: ast
        target: throw_statement
        pattern: "throw\\s+new\\s+\\w+Exception\\("
        message: "抛出异常必须使用 HttpException 或其子类"
        examples:
          valid:
            - "throw new HttpException('用户不存在', HttpStatus.NOT_FOUND);"
            - "throw new UserNotFoundException();"
          invalid:
            - "throw new Error('用户不存在');"
            - "throw '用户不存在';"

      - id: EXC-003
        name: 全局异常过滤器
        priority: MUST
        type: content
        target: filter
        pattern: "@Catch\\(\\)"
        message: "必须实现全局异常过滤器，统一处理异常响应格式"
        examples:
          valid: |
            @Catch()
            export class AllExceptionsFilter implements ExceptionFilter {
              catch(exception: unknown, host: ArgumentsHost) {
                // 统一处理
              }
            }

      - id: EXC-004
        name: Try-Catch 使用
        priority: SHOULD
        type: content
        target: try_catch
        pattern: "try\\s*\\{[\\s\\S]*?\\}\\s*catch\\s*\\([^)]+\\)\\s*\\{"
        message: |
          以下情况应使用 Try-Catch：
          1. 需要记录详细错误日志
          2. 需要进行错误转换
          3. 需要执行清理操作
        examples:
          valid: |
            try {
              await this.userService.create(dto);
            } catch (error) {
              this.logger.error('创建用户失败', error);
              throw new UserCreateException();
            }

  # 分类 5：代码复杂度
  - id: CODE_COMPLEXITY
    name: 代码复杂度控制
    description: 控制代码复杂度，提高可维护性
    rules:
      - id: CMPLX-001
        name: 方法长度
        priority: SHOULD
        type: structure
        target: method
        max_lines: 50
        message: "方法长度不宜超过 50 行，过长应拆分为多个小方法"

      - id: CMPLX-002
        name: 类长度
        priority: SHOULD
        type: structure
        target: class
        max_lines: 300
        message: "类长度不宜超过 300 行，过长应拆分为多个类"

      - id: CMPLX-003
        name: 圈复杂度
        priority: SHOULD
        type: structure
        target: method
        max_complexity: 10
        message: "方法圈复杂度不宜超过 10（if/else/for/while 等控制结构数量）"

      - id: CMPLX-004
        name: 参数数量
        priority: SHOULD
        type: structure
        target: method
        max_parameters: 5
        message: "方法参数不宜超过 5 个，过多应使用 DTO 封装"
        examples:
          valid:
            - "createUser(dto: CreateUserDto)"
          invalid:
            - "createUser(username: string, password: string, email: string, phone: string, nickname: string, address: string)"

      - id: CMPLX-005
        name: 方法职责单一
        priority: SHOULD
        type: content
        target: method
        message: "每个方法只应负责一项职责"
        examples:
          valid:
            - "// createUser 只负责创建用户"
          invalid:
            - "// createUser 方法内同时创建用户、发送邮件、记录日志、推送通知（应拆分）"

---
# 任务导向索引
task_index:
  - task: create_service
    trigger_keywords: ["编写 Service", "创建服务", "业务逻辑"]
    required_rules:
      - "ARCH-001:DEPENDENCY_INJECTION"
      - "ARCH-001:LAYER_STRUCTURE"
      - "ARCH-001:EXCEPTION_HANDLING"

  - task: create_controller
    trigger_keywords: ["编写 Controller", "创建控制器", "API 接口"]
    required_rules:
      - "ARCH-001:LAYER_STRUCTURE"
      - "ARCH-001:DEPENDENCY_INJECTION"

  - task: create_module
    trigger_keywords: ["创建模块", "Module"]
    required_rules:
      - "ARCH-001:MODULE_DESIGN"
      - "ARCH-001:DEPENDENCY_INJECTION"

  - task: handle_exception
    trigger_keywords: ["异常处理", "错误处理", "try-catch"]
    required_rules:
      - "ARCH-001:EXCEPTION_HANDLING"

---
# 快速参考
quick_reference:
  layer_dependencies:
    Controller: ["Service"]
    Service: ["Repository", "Entity", "其他 Service"]
    Repository: ["Entity"]
    Entity: []

  di_pattern: |
    @Injectable()
    export class UserService {
      constructor(
        private readonly userRepository: UserRepository,
        private readonly emailService: EmailService,
      ) {}
    }

  exception_pattern: |
    export class UserNotFoundException extends HttpException {
      constructor(userId?: string) {
        super(
          { code: 10003, message: `用户${userId ? '(' + userId + ')' : ''}不存在` },
          HttpStatus.NOT_FOUND,
        );
      }
    }
