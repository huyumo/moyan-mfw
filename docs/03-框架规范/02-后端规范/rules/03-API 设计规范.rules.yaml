---
meta:
  id: API-001
  name: API 设计规范
  version: 1.0
  source: docs/03-框架规范/02-后端规范/03-API 设计规范.md
  last_updated: 2026-03-31
  priority: MUST

---
categories:
  # 分类 1：RESTful 路径设计
  - id: RESTFUL_PATH
    name: RESTful 路径设计
    description: API 路径必须遵循 RESTful 风格
    rules:
      - id: REST-001
        name: 资源命名复数
        priority: MUST
        type: regex
        target: route_path
        pattern: "@\\w+\\(['\"]/[^'\"]*/[a-z]+s"
        message: "路径中的资源名必须使用复数形式"
        examples:
          valid:
            - "@Get('users')"
            - "@Post('users')"
            - "@Get('users/:id')"
          invalid:
            - "@Get('user')"
            - "@Post('getUser')"
            - "@Get('user/list')"

      - id: REST-002
        name: 路径命名 kebab-case
        priority: MUST
        type: regex
        target: route_path
        pattern: "@\\w+\\(['\"][^'\"]*[a-z]+(-[a-z]+)*[^'\"]*['\"]\\)"
        message: "路径中的资源名必须使用 kebab-case（短横线分隔）"
        examples:
          valid:
            - "@Get('user-profiles')"
            - "@Get('auth-tokens')"
          invalid:
            - "@Get('userProfiles')"
            - "@Get('user_profiles')"

      - id: REST-003
        name: 版本号控制
        priority: MUST
        type: regex
        target: route_prefix
        pattern: "@ApiTags\\(['\"].*v[0-9]+.*['\"]\\)|@Controller\\(['\"].*v[0-9]+.*['\"]\\)"
        message: "API 路径必须包含版本号（如 /api/v1/）"
        examples:
          valid:
            - "@Controller('api/v1/users')"
            - "@ApiTags('api/v1/auth')"
          invalid:
            - "@Controller('api/users')"  // 缺少版本号
            - "@Controller('users')"      // 缺少版本号和 api 前缀

      - id: REST-004
        name: 禁止动词在路径中
        priority: MUST
        type: regex
        target: route_path
        pattern: "@\\w+\\(['\"][^'\"]*/(get|list|create|update|delete|add|remove|save|fetch)[^'\"]*['\"]\\)"
        negative: true
        message: "路径中禁止使用动词，应使用 HTTP 方法表达操作"
        examples:
          valid:
            - "@Get('users')"
            - "@Post('users')"
            - "@Delete('users/:id')"
          invalid:
            - "@Get('getUsers')"
            - "@Post('createUser')"
            - "@Post('saveUser')"

      - id: REST-005
        name: 资源嵌套深度
        priority: MUST
        type: regex
        target: route_path
        pattern: "@\\w+\\(['\"][^'\"]*/[^'\"]*/[^'\"]*/[^'\"]*/[^'\"]+['\"]\\)"
        negative: true
        message: "资源嵌套不得超过三级"
        examples:
          valid:
            - "@Get('users/:userId/posts')"         // 两级
            - "@Get('users/:userId/posts/:postId/comments')"  // 三级
          invalid:
            - "@Get('users/:userId/posts/:postId/comments/:commentId/replies')"  // 四级

      - id: REST-006
        name: HTTP 方法使用
        priority: MUST
        type: ast
        target: http_method
        mapping:
          GET: "查询，无副作用"
          POST: "创建资源"
          PUT: "全量更新"
          PATCH: "部分更新"
          DELETE: "删除资源"
        message: "必须根据操作类型正确使用 HTTP 方法"
        examples:
          valid:
            - "@Get()"
            - "@Post()"
            - "@Put(':id')"
            - "@Patch(':id')"
            - "@Delete(':id')"
          invalid:
            - "@Post('delete')"  // 删除操作应使用 @Delete
            - "@Get('create')"   // 创建操作应使用 @Post

  # 分类 2：统一响应格式
  - id: RESPONSE_FORMAT
    name: 统一响应格式
    description: 所有 API 必须返回统一格式的响应
    rules:
      - id: RESP-001
        name: 响应结构
        priority: MUST
        type: ast
        target: return_statement
        structure:
          type: object
          required_fields:
            - name: code
              type: number
            - name: data
              type: any
            - name: message
              type: string
        message: "Controller 返回值必须包含 { code, data, message }"
        examples:
          valid:
            - "return { code: 0, data: user, message: 'success' };"
            - "return { code: 0, data: list, message: '查询成功' };"
          invalid:
            - "return user;"
            - "return { success: true, data: user };"
            - "return { code: 0, user };"  // 缺少 message

      - id: RESP-002
        name: 成功响应 code 值
        priority: MUST
        type: content
        target: return_statement
        pattern: "code:\\s*0"
        message: "成功响应的 code 必须为 0"
        examples:
          valid:
            - "return { code: 0, data: user, message: 'success' };"
          invalid:
            - "return { code: 200, data: user, message: 'success' };"
            - "return { code: 1, data: user, message: 'success' };"

      - id: RESP-003
        name: 分页响应格式
        priority: MUST
        type: ast
        target: pagination_response
        structure:
          type: object
          required_fields:
            - name: code
              type: number
            - name: data
              type: object
              fields:
                - name: list
                  type: array
                - name: total
                  type: number
                - name: page
                  type: number
                - name: pageSize
                  type: number
        message: "分页响应必须包含 { code, data: { list, total, page, pageSize } }"
        examples:
          valid:
            - "return { code: 0, data: { list, total, page, pageSize }, message: 'success' };"
          invalid:
            - "return { code: 0, data: { items: list, count: total }, message: 'success' };"

      - id: RESP-004
        name: 敏感数据脱敏
        priority: MUST
        type: content
        target: response_data
        forbidden_fields_in_response:
          - "password"
          - "passwordHash"
          - "salt"
          - "token"
          - "secret"
          - "accessToken"
        message: "响应中禁止包含敏感字段（密码、token 等）"
        examples:
          valid:
            - "return { code: 0, data: { id, username, email }, message: 'success' };"
          invalid:
            - "return { code: 0, data: { id, username, passwordHash }, message: 'success' };"

  # 分类 3：错误码规范
  - id: ERROR_CODE
    name: 错误码规范
    description: 统一的错误码定义和使用
    rules:
      - id: ERR-001
        name: 错误码格式
        priority: MUST
        type: regex
        target: error_code
        pattern: "\\b[1-9][0-9]{4}\\b"
        message: "错误码必须为 5 位数字，首位表示错误分类"
        error_categories:
          1xxxx: "客户端错误（认证、授权、参数）"
          2xxxx: "业务逻辑错误"
          3xxxx: "数据库错误"
          4xxxx: "第三方服务错误"
          5xxxx: "系统内部错误"

      - id: ERR-002
        name: 错误码常量定义
        priority: MUST
        type: structure
        target: error_constant
        pattern: "export const \\w+Error = {[^}]+code:\\s*[0-9]+"
        message: "错误码必须定义为常量，禁止硬编码"
        examples:
          valid:
            - |
              export const UserError = {
                NOT_FOUND: { code: 10003, message: '用户不存在' },
                EXISTS: { code: 10002, message: '用户已存在' },
              };
          invalid:
            - "throw new HttpException('用户不存在', 404);"  // 硬编码
            - "throw new HttpException({ code: 10003 }, 404);"  // 未使用常量

      - id: ERR-003
        name: 错误响应格式
        priority: MUST
        type: ast
        target: error_response
        structure:
          type: object
          required_fields:
            - name: code
              type: number
            - name: message
              type: string
        message: "错误响应必须包含 code 和 message"
        examples:
          valid:
            - "throw new HttpException({ code: 10003, message: '用户不存在' }, HttpStatus.NOT_FOUND);"
          invalid:
            - "throw new HttpException('用户不存在', HttpStatus.NOT_FOUND);"

  # 分类 4：请求体验证
  - id: REQUEST_VALIDATION
    name: 请求体验证规范
    description: 使用 class-validator 进行请求体验证
    rules:
      - id: VAL-001
        name: DTO 验证装饰器
        priority: MUST
        type: content
        target: dto_class
        pattern: "@IsString\\(\\)|@IsNumber\\(\\)|@IsEmail\\(\\)|@IsOptional\\(\\)|@ValidateNested\\(\\)"
        message: "DTO 字段必须使用 class-validator 装饰器进行验证"
        examples:
          valid: |
            export class CreateUserDto {
              @IsString()
              @MinLength(3)
              username: string;

              @IsEmail()
              email: string;
            }
          invalid: |
            export class CreateUserDto {
              username: string;  // 无验证装饰器
              email: string;
            }

      - id: VAL-002
        name: ValidationPipe 使用
        priority: MUST
        type: ast
        target: controller_method
        pattern: "@Body\\([^)]*\\)\\s+\\w+:\\s*\\w+Dto"
        message: "Controller 方法必须使用 @Body() 装饰器接收 DTO"
        examples:
          valid:
            - "@Post() createUser(@Body() dto: CreateUserDto)"
          invalid:
            - "@Post() createUser(@Body() body: any)"
            - "@Post() createUser(body)"

      - id: VAL-003
        name: 必填字段验证
        priority: MUST
        type: content
        target: dto_field
        pattern: "@IsString\\(\\)|@IsNumber\\(\\)|@IsBoolean\\(\\)"
        message: "必填字段必须使用相应的类型验证装饰器"
        examples:
          valid:
            - "@IsString() username: string;"
            - "@IsNumber() age: number;"
          invalid:
            - "username: string;  // 无验证"

      - id: VAL-004
        name: 可选字段标记
        priority: MUST
        type: content
        target: dto_field
        pattern: "@IsOptional\\(\\)"
        message: "可选字段必须使用 @IsOptional() 标记"
        examples:
          valid:
            - "@IsOptional() @IsString() nickname?: string;"
          invalid:
            - "nickname?: string;  // 未标记 @IsOptional"

  # 分类 5：Swagger 注解
  - id: SWAGGER
    name: Swagger 注解规范
    description: API 文档注解
    rules:
      - id: SWG-001
        name: ApiOperation 注解
        priority: MUST
        type: content
        target: controller_method
        pattern: "@ApiOperation\\(\\{[^}]*summary:"
        message: "Controller 方法必须使用 @ApiOperation 注解说明接口功能"
        examples:
          valid:
            - "@ApiOperation({ summary: '创建用户' })"
          invalid:
            - "// 创建用户"  // 仅注释，无注解

      - id: SWG-002
        name: ApiResponse 注解
        priority: MUST
        type: content
        target: controller_method
        pattern: "@ApiResponse\\(\\{[^}]*status:"
        message: "Controller 方法必须使用 @ApiResponse 注解说明响应"
        examples:
          valid:
            - "@ApiResponse({ status: 201, description: '创建成功' })"
            - "@ApiResponse({ status: 400, description: '参数错误' })"
          invalid:
            - "// 返回 201"  // 仅注释，无注解

      - id: SWG-003
        name: ApiTags 注解
        priority: MUST
        type: content
        target: controller_class
        pattern: "@ApiTags\\(['\"][^'\"]+['\"]\\)"
        message: "Controller 类必须使用 @ApiTags 注解标记分类"
        examples:
          valid:
            - "@ApiTags('用户管理')"
          invalid:
            - "// 用户管理 Controller"  // 仅注释

---
# 任务导向索引
task_index:
  - task: create_api
    trigger_keywords: ["新建 API", "创建接口", "生成 Controller"]
    required_rules:
      - "API-001:RESTFUL_PATH"
      - "API-001:RESPONSE_FORMAT"
      - "API-001:REQUEST_VALIDATION"
      - "API-001:SWAGGER"

  - task: create_dto
    trigger_keywords: ["创建 DTO", "请求体", "参数验证"]
    required_rules:
      - "API-001:REQUEST_VALIDATION"

  - task: define_error
    trigger_keywords: ["错误码", "错误处理", "异常"]
    required_rules:
      - "API-001:ERROR_CODE"

---
# 快速参考
quick_reference:
  response_template: |
    // 成功响应
    return { code: 0, data: result, message: 'success' };

    // 分页响应
    return { code: 0, data: { list, total, page, pageSize }, message: 'success' };

  error_template: |
    throw new HttpException(
      { code: 10003, message: '用户不存在' },
      HttpStatus.NOT_FOUND
    );

  dto_template: |
    export class CreateUserDto {
      @IsString()
      @MinLength(3)
      @ApiProperty({ description: '用户名', example: 'zhangsan' })
      username: string;

      @IsEmail()
      @ApiProperty({ description: '邮箱', example: 'test@example.com' })
      email: string;

      @IsOptional()
      @IsString()
      @ApiPropertyOptional({ description: '昵称' })
      nickname?: string;
    }

  controller_template: |
    @Controller('api/v1/users')
    @ApiTags('用户管理')
    export class UserController {
      constructor(private readonly userService: UserService) {}

      @Post()
      @ApiOperation({ summary: '创建用户' })
      @ApiResponse({ status: 201, description: '创建成功' })
      @ApiResponse({ status: 400, description: '参数错误' })
      async create(@Body() dto: CreateUserDto) {
        const user = await this.userService.create(dto);
        return { code: 0, data: user, message: '创建成功' };
      }
    }
