  name: 编码基础规范
  version: 1.0
  source: docs/03-框架规范/02-后端规范/01-编码基础规范.md
  last_updated: 2026-03-31
  priority: MUST

---
# 分类 1：文件命名规范
categories:
  - id: FILE_NAMING
    name: 文件命名规范
    description: 所有 TypeScript 文件必须使用 kebab-case + 功能后缀
    rules:
      - id: FILE-001
        name: TypeScript 文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.(service|controller|entity|dto|vo|dto\\.vo|types|config|middleware|module|interface|enum|constant)\\.ts$"
        message: |
          文件名必须使用 kebab-case（短横线分隔）+ 功能后缀
          ✅ 有效：user.service.ts, auth.controller.ts, user.entity.ts
          ❌ 无效：UserService.ts, user_service.ts, User.ts
        examples:
          valid:
            - user.service.ts
            - auth.controller.ts
            - user.entity.ts
            - create-user.dto.ts
            - user.vo.ts
            - user-types.ts
            - database.config.ts
            - auth.middleware.ts
            - user.module.ts
            - http-client.interface.ts
            - role-type.enum.ts
            - error-codes.constant.ts
          invalid:
            - UserService.ts
            - user_service.ts
            - User.ts
            - CreateUserDTO.ts
            - userTypes.ts
            - ERROR_CODES.ts

      - id: FILE-002
        name: 服务类文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.service\\.ts$"
        message: "服务类文件必须以 .service.ts 结尾"
        examples:
          valid: ["user.service.ts", "user-message.service.ts", "auth.service.ts"]
          invalid: ["UserService.ts", "user-service.ts", "user.ts"]

      - id: FILE-003
        name: 控制器文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.controller\\.ts$"
        message: "控制器文件必须以 .controller.ts 结尾"
        examples:
          valid: ["user.controller.ts", "auth.controller.ts"]
          invalid: ["UserController.ts", "user-controller.ts"]

      - id: FILE-004
        name: 实体文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.entity\\.ts$"
        message: "实体文件必须以 .entity.ts 结尾"
        examples:
          valid: ["user.entity.ts", "role.entity.ts"]
          invalid: ["User.ts", "user-entity.ts", "UserEntity.ts"]

      - id: FILE-005
        name: DTO/VO文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.(dto|vo)\\.ts$"
        message: "DTO/VO文件必须以 .dto.ts 或 .vo.ts 结尾"
        examples:
          valid: ["create-user.dto.ts", "user.vo.ts", "user-query.dto.ts"]
          invalid: ["CreateUserDto.ts", "UserVO.ts", "userDto.ts"]

      - id: FILE-006
        name: 类型定义文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*-types\\.ts$"
        message: "类型定义文件必须以 -types.ts 结尾"
        examples:
          valid: ["user-types.ts", "common-types.ts", "api-types.ts"]
          invalid: ["userTypes.ts", "user.types.ts", "UserTypes.ts"]

      - id: FILE-007
        name: 配置文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.config\\.ts$"
        message: "配置文件必须以 .config.ts 结尾"
        examples:
          valid: ["database.config.ts", "app.config.ts", "redis.config.ts"]
          invalid: ["DatabaseConfig.ts", "database-config.ts"]

      - id: FILE-008
        name: 中间件文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.middleware\\.ts$"
        message: "中间件文件必须以 .middleware.ts 结尾"
        examples:
          valid: ["auth.middleware.ts", "logger.middleware.ts"]
          invalid: ["AuthMiddleware.ts", "auth-middleware.ts"]

      - id: FILE-009
        name: 模块文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.module\\.ts$"
        message: "模块文件必须以 .module.ts 结尾"
        examples:
          valid: ["user.module.ts", "auth.module.ts"]
          invalid: ["UserModule.ts", "user-module.ts"]

      - id: FILE-010
        name: 常量文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.constant\\.ts$"
        message: "常量文件必须以 .constant.ts 结尾（禁止使用 UPPER_SNAKE_CASE）"
        examples:
          valid: ["error-codes.constant.ts", "api-constants.constant.ts"]
          invalid: ["ERROR_CODES.ts", "ErrorCodes.ts", "error-codes.ts"]

  # 分类 2：目录结构规范
  - id: DIRECTORY
    name: 目录结构规范
    description: 项目必须使用规范的目录结构
    rules:
      - id: DIR-001
        name: 实体目录
        priority: MUST
        type: structure
        target: directory
        mapping:
          entities: "src/entities/"
          services: "src/services/"
          controllers: "src/controllers/"
          dto: "src/dto/"
          vo: "src/vo/"
          guards: "src/guards/"
          interceptors: "src/interceptors/"
          filters: "src/filters/"
          pipes: "src/pipes/"
          modules: "src/modules/"
          config: "src/config/"
          constants: "src/constants/"
          types: "src/types/"
          interfaces: "src/interfaces/"
          utils: "src/utils/"
          middlewares: "src/middlewares/"
        message: |
          必须使用规范的目录结构
          ✅ src/entities/ - 实体类
          ✅ src/services/ - 服务层
          ✅ src/controllers/ - 控制器层
          ❌ models/ - 禁止使用
          ❌ dao/ - 禁止使用

      - id: DIR-002
        name: 禁止目录
        priority: MUST
        type: structure
        target: forbidden_directory
        forbidden:
          - "models/"
          - "dao/"
          - "handlers/"
          - "routers/"
        message: "禁止使用 models/、dao/、handlers/、routers/ 目录"

      - id: DIR-003
        name: 业务模块目录
        priority: SHOULD
        type: structure
        target: directory
        pattern: "src/modules/[a-z]+(-[a-z]+)*/"
        message: "业务模块应放在 src/modules/ 目录下，使用 kebab-case 命名"

  # 分类 3：代码命名规范
  - id: CODE_NAMING
    name: 代码命名规范
    description: 类、方法、变量、常量的命名规则
    rules:
      - id: CODE-001
        name: 类命名
        priority: MUST
        type: naming
        target: class
        pattern: "^[A-Z][a-zA-Z0-9]*$"
        suffix:
          service: "Service"
          controller: "Controller"
          entity: "Entity"
          dto: "Dto"
          vo: "Vo"
          guard: "Guard"
          interceptor: "Interceptor"
          filter: "Filter"
          pipe: "Pipe"
          module: "Module"
        message: "类名必须使用 PascalCase，并根据类型添加相应后缀"
        examples:
          valid:
            - "class UserService {}"
            - "class UserController {}"
            - "class UserEntity {}"
            - "class CreateUserDto {}"
          invalid:
            - "class userService {}"
            - "class User_Service {}"
            - "class userDto {}"

      - id: CODE-002
        name: 方法命名
        priority: MUST
        type: naming
        target: method
        pattern: "^[a-z][a-zA-Z0-9]*$"
        message: "方法名必须使用 camelCase"
        examples:
          valid:
            - "getUserById()"
            - "createUser()"
            - "handleException()"
          invalid:
            - "GetUserById()"
            - "get_user_by_id()"
            - "GETUSERBYID()"

      - id: CODE-003
        name: 变量命名
        priority: MUST
        type: naming
        target: variable
        pattern: "^[a-z][a-zA-Z0-9]*$"
        message: "变量名必须使用 camelCase"
        examples:
          valid:
            - "const userName = 'test';"
            - "let totalCount = 0;"
          invalid:
            - "const UserName = 'test';"
            - "const user_name = 'test';"

      - id: CODE-004
        name: 常量命名
        priority: MUST
        type: naming
        target: constant
        pattern: "^[A-Z][A-Z0-9_]*$"
        message: "常量名必须使用 UPPER_SNAKE_CASE（仅适用于真正的常量）"
        examples:
          valid:
            - "const MAX_RETRY_COUNT = 3;"
            - "const API_VERSION = 'v1';"
          invalid:
            - "const max_retry_count = 3;"
            - "const MaxRetryCount = 3;"

      - id: CODE-005
        name: 私有属性命名
        priority: SHOULD
        type: naming
        target: private_property
        pattern: "^_"
        message: "私有属性建议以下划线开头"
        examples:
          valid:
            - "private _userRepository;"
          invalid:
            - "private userRepository;"

  # 分类 4：注释规范
  - id: COMMENT
    name: 注释规范
    description: 文件、类、方法的注释要求
    rules:
      - id: CMT-001
        name: 文件头注释
        priority: MUST
        type: content
        target: file_header
        pattern: "/\\*\\*\\s*\\n\\s*\\*\\s*@fileoverview"
        message: "每个文件必须有文件头注释，包含 @fileoverview"
        template: |
          /**
           * @fileoverview [文件名] - [功能说明]
           * @description [详细描述，可选]
           */

      - id: CMT-002
        name: 类注释
        priority: SHOULD
        type: content
        target: class
        pattern: "/\\*\\*[\\s\\S]*?\\*/\\s*(export\\s+)?class"
        message: "类定义前应该有注释说明"

      - id: CMT-003
        name: 公共方法注释
        priority: MUST
        type: content
        target: public_method
        pattern: "/\\*\\*[\\s\\S]*?\\*/\\s*(public\\s+)?(async\\s+)?[a-z]+"
        message: "公共方法必须有注释，说明功能、参数和返回值"
        template: |
          /**
           * [方法功能说明]
           * @param {[参数类型]} [参数名] - [参数说明]
           * @returns {Promise<[返回类型]>} [返回值说明]
           * @throws {[异常类型]} [触发条件]
           */

      - id: CMT-004
        name: 实体类注解注释
        priority: MUST
        type: content
        target: entity_column
        pattern: "@Column\\(\\{[^}]*comment:\\s*['\"][^'\"]+['\"]"
        message: "实体类 @Column 注解必须包含 comment 字段"
        template: |
          @Column({
            type: 'varchar',
            length: 50,
            comment: '用户名 - 用户登录标识 - 唯一，必填',
          })

  # 分类 5：导入导出规范
  - id: IMPORT_EXPORT
    name: 导入导出规范
    description: import/export 语句的规范
    rules:
      - id: IMP-001
        name: 导入顺序
        priority: SHOULD
        type: structure
        target: import_order
        order:
          - "第三方库"
          - "项目绝对路径 (@/...)"
          - "相对路径 (./...)"
        message: "导入语句应按顺序排列：第三方库 → 项目绝对路径 → 相对路径"
        examples:
          valid: |
            import { Module } from '@nestjs/common';
            import { TypeOrmModule } from '@nestjs/typeorm';

            import { UserService } from '@/services/user.service';
            import { UserEntity } from '@/entities/user.entity';

            import { CreateUserDto } from './dto/create-user.dto';
          invalid: |
            import { CreateUserDto } from './dto/create-user.dto';
            import { Module } from '@nestjs/common';

      - id: IMP-002
        name: 禁止通配符导入
        priority: MUST
        type: regex
        target: import_statement
        pattern: "import\\s+\\*\\s+as"
        negative: true
        message: "禁止使用通配符导入（import * as）"
        examples:
          valid:
            - "import { UserService } from './user.service';"
          invalid:
            - "import * as UserService from './user.service';"

      - id: IMP-003
        name: 导出规范
        priority: SHOULD
        type: structure
        target: export
        pattern: "export \\{ [^}]+ \\} from"
        message: "优先使用具名导出，避免默认导出"
        examples:
          valid:
            - "export { UserService } from './user.service';"
          invalid:
            - "export default UserService;"

  # 分类 6：代码组织结构
  - id: CODE_STRUCTURE
    name: 代码组织结构
    description: 类和文件内部的代码组织
    rules:
      - id: STRUCT-001
        name: Service 类结构
        priority: MUST
        type: structure
        target: service_class
        order:
          - "依赖注入（构造函数）"
          - "私有属性"
          - "公共方法"
          - "私有方法"
        message: "Service 类应按顺序组织：依赖注入 → 私有属性 → 公共方法 → 私有方法"

      - id: STRUCT-002
        name: Controller 类结构
        priority: MUST
        type: structure
        target: controller_class
        order:
          - "依赖注入（构造函数）"
          - "公共方法（按 CRUD 顺序）"
        message: "Controller 类应按顺序组织：依赖注入 → 公共方法（Create/Read/Update/Delete）"

      - id: STRUCT-003
        name: 方法长度限制
        priority: SHOULD
        type: structure
        target: method
        max_lines: 50
        message: "方法长度不宜超过 50 行，过长应拆分"

      - id: STRUCT-004
        name: 类长度限制
        priority: SHOULD
        type: structure
        target: class
        max_lines: 300
        message: "类长度不宜超过 300 行，过长应拆分为多个类"

---
# 任务导向索引
task_index:
  - task: create_file
    trigger_keywords: ["新建文件", "创建文件", "生成文件"]
    required_rules:
      - "CODING-001:FILE_NAMING"
      - "CODING-001:DIRECTORY"
      - "CODING-001:COMMENT"

  - task: write_class
    trigger_keywords: ["编写类", "创建类", "定义类"]
    required_rules:
      - "CODING-001:CODE_NAMING"
      - "CODING-001:CODE_STRUCTURE"
      - "CODING-001:COMMENT"

  - task: write_method
    trigger_keywords: ["编写方法", "创建方法", "定义方法"]
    required_rules:
      - "CODING-001:CODE_NAMING"
      - "CODING-001:COMMENT"

  - task: import_module
    trigger_keywords: ["导入", "引入", "import"]
    required_rules:
      - "CODING-001:IMPORT_EXPORT"

---
# 快速参考
quick_reference:
  file_suffixes:
    service: ".service.ts"
    controller: ".controller.ts"
    entity: ".entity.ts"
    dto: ".dto.ts"
    vo: ".vo.ts"
    types: "-types.ts"
    config: ".config.ts"
    middleware: ".middleware.ts"
    module: ".module.ts"
    constant: ".constant.ts"

  directories:
    entities: "src/entities/"
    services: "src/services/"
    controllers: "src/controllers/"
    dto: "src/dto/"
    vo: "src/vo/"
    guards: "src/guards/"
    interceptors: "src/interceptors/"
    filters: "src/filters/"
    modules: "src/modules/"
    config: "src/config/"
    constants: "src/constants/"
    types: "src/types/"
    utils: "src/utils/"
