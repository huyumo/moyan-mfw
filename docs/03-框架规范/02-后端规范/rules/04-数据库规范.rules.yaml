---
meta:
  id: DB-001
  name: 数据库规范
  version: 1.0
  source: docs/03-框架规范/02-后端规范/04-数据库规范.md
  last_updated: 2026-03-31
  priority: MUST

---
categories:
  # 分类 1：实体设计
  - id: ENTITY_DESIGN
    name: 实体设计规范
    description: TypeORM 实体类的设计规范
    rules:
      - id: ENT-001
        name: 实体文件命名
        priority: MUST
        type: regex
        target: file_name
        pattern: "^[a-z]+(-[a-z]+)*\\.entity\\.ts$"
        message: "实体文件必须以 .entity.ts 结尾"
        examples:
          valid: ["user.entity.ts", "role.entity.ts", "user-profile.entity.ts"]
          invalid: ["User.ts", "UserEntity.ts", "user_entity.ts"]

      - id: ENT-002
        name: 实体类命名
        priority: MUST
        type: regex
        target: class_name
        pattern: "^[A-Z][a-zA-Z0-9]*Entity$"
        message: "实体类名必须使用 PascalCase + Entity 后缀"
        examples:
          valid: ["class UserEntity {}", "class UserProfileEntity {}"]
          invalid: ["class User {}", "class userEntity {}", "class User_Entity {}"]

      - id: ENT-003
        name: 实体表名
        priority: MUST
        type: content
        target: entity_decorator
        pattern: "@Entity\\(\\{[^}]*name:\\s*['\"][a-z]+_[a-z]+['\"]"
        message: "实体必须使用 @Entity 装饰器指定表名（蛇形命名）"
        examples:
          valid:
            - "@Entity({ name: 'sys_users' })"
            - "@Entity('sys_roles')"
          invalid:
            - "@Entity()"  // 未指定表名
            - "@Entity({ name: 'SysUsers' })"  // 表名应使用蛇形命名

      - id: ENT-004
        name: 主键注解
        priority: MUST
        type: content
        target: entity_column
        pattern: "@PrimaryGeneratedColumn\\(\\{[^}]*type:\\s*['\"](uuid|bigint)[ '\"]"
        message: "主键必须使用 @PrimaryGeneratedColumn，推荐使用 uuid 或 bigint 类型"
        examples:
          valid:
            - "@PrimaryGeneratedColumn('uuid')"
            - "@PrimaryGeneratedColumn('increment')"  // 自增 ID
          invalid:
            - "@Column({ primary: true })"  // 未使用 GeneratedColumn
            - "@PrimaryGeneratedColumn()"  // 未指定类型（默认 int 不推荐）

      - id: ENT-005
        name: 字段注解 comment
        priority: MUST
        type: content
        target: entity_column
        pattern: "@Column\\(\\{[^}]*comment:\\s*['\"][^'\"]+['\"]"
        message: "@Column 注解必须包含 comment 字段，格式：字段名称 - 用途说明 - 约束/规则"
        examples:
          valid:
            - |
              @Column({
                type: 'varchar',
                length: 50,
                comment: '用户名 - 用户登录标识 - 唯一，必填，3-50 字符',
              })
          invalid:
            - "@Column({ type: 'varchar', length: 50 })"  // 缺少 comment

      - id: ENT-006
        name: 字段类型指定
        priority: MUST
        type: content
        target: entity_column
        pattern: "@Column\\(\\{[^}]*type:\\s*['\"]"
        message: "@Column 注解必须明确指定 type 字段"
        allowed_types:
          - "varchar"
          - "text"
          - "int"
          - "bigint"
          - "decimal"
          - "datetime"
          - "timestamp"
          - "boolean"
          - "json"
          - "uuid"
        examples:
          valid:
            - "@Column({ type: 'varchar', length: 50, comment: '用户名' })"
          invalid:
            - "@Column({ comment: '用户名' })"  // 缺少 type

      - id: ENT-007
        name: 通用字段规范
        priority: MUST
        type: content
        target: entity_common_fields
        required_fields:
          - "createdAt"
          - "updatedAt"
          - "deletedAt"
        message: "实体必须包含通用字段：createdAt, updatedAt, deletedAt"
        examples:
          valid: |
            @Column({ type: 'datetime', comment: '创建时间' })
            createdAt: Date;

            @Column({ type: 'datetime', comment: '更新时间' })
            updatedAt: Date;

            @Column({ type: 'datetime', nullable: true, comment: '删除时间' })
            @DeleteDateColumn()
            deletedAt: Date;

      - id: ENT-008
        name: 关系实体注解
        priority: MUST
        type: content
        target: entity_relation
        patterns:
          one_to_many: "@OneToMany\\(\\(\\)\\s*=>\\s*\\w+\\."
          many_to_one: "@ManyToOne\\(\\(\\)\\s*=>\\s*\\w+\\."
          one_to_one: "@OneToOne\\(\\(\\)\\s*=>\\s*\\w+\\."
          many_to_many: "@ManyToMany\\(\\(\\)\\s*=>\\s*\\w+\\."
        message: "关系字段必须使用正确的关系注解"
        examples:
          valid:
            - "@OneToMany(() => RoleEntity, role => role.user)"
            - "@ManyToOne(() => UserEntity, user => user.roles)"
          invalid:
            - "roles: RoleEntity[]"  // 无关系注解

      - id: ENT-009
        name: 禁止 SELECT *
        priority: MUST
        type: regex
        target: query
        pattern: "SELECT\\s+\\*"
        negative: true
        message: "禁止使用 SELECT *，必须明确指定查询字段"
        examples:
          valid:
            - "SELECT id, username, email FROM users"
          invalid:
            - "SELECT * FROM users"

  # 分类 2：Repository 模式
  - id: REPOSITORY_PATTERN
    name: Repository 模式
    description: 使用 TypeORM Repository 进行数据访问
    rules:
      - id: REPO-001
        name: Repository 注入
        priority: MUST
        type: ast
        target: repository_injection
        pattern: "@InjectRepository\\(\\w+Entity\\)"
        message: "Repository 必须使用 @InjectRepository 装饰器注入"
        examples:
          valid:
            - |
              constructor(
                @InjectRepository(UserEntity)
                private readonly userRepository: Repository<UserEntity>,
              ) {}
          invalid:
            - "private userRepository = getRepository(UserEntity);"
            - "private userRepository: Repository<UserEntity>;"  // 未注入

      - id: REPO-002
        name: 参数化查询
        priority: MUST
        type: content
        target: query_builder
        pattern: "where\\([^,]+,\\s*\\{"
        message: "QueryBuilder 必须使用参数化查询，禁止字符串拼接"
        examples:
          valid:
            - ".where('user.username = :username', { username })"
          invalid:
            - ".where(`user.username = '${username}'`)"

      - id: REPO-003
        name: 避免 N+1 查询
        priority: MUST
        type: content
        target: repository_query
        pattern: "leftJoinAndSelect|innerJoinAndSelect"
        message: "查询关联数据时必须使用 join，避免 N+1 查询问题"
        examples:
          valid:
            - |
              return this.userRepository
                .createQueryBuilder('user')
                .leftJoinAndSelect('user.roles', 'role')
                .getMany();
          invalid: |
            const users = await this.userRepository.find();
            for (const user of users) {
              user.roles = await this.roleRepository.findByUserId(user.id);
            }

      - id: REPO-004
        name: 分页查询规范
        priority: MUST
        type: content
        target: pagination_query
        pattern: "take\\([^)]+\\)\\.skip\\([^)]+\\)"
        message: "分页查询必须使用 take/skip，并返回总数"
        examples:
          valid:
            - |
              const [list, total] = await this.userRepository
                .createQueryBuilder('user')
                .take(pageSize)
                .skip((page - 1) * pageSize)
                .getManyAndCount();
              return { list, total, page, pageSize };

  # 分类 3：事务管理
  - id: TRANSACTION
    name: 事务管理规范
    description: 事务的使用和管理
    rules:
      - id: TXN-001
        name: 事务使用场景
        priority: MUST
        type: content
        target: service_method
        message: |
          以下情况必须使用事务：
          1. 涉及多个表的写入操作
          2. 涉及多个 Repository 的写入操作
          3. 需要保证数据一致性的操作
        examples:
          valid: |
            await this.dataSource.transaction(async (manager) => {
              await manager.save(user);
              await manager.save(role);
              await manager.save(userRole);
            });

      - id: TXN-002
        name: 事务装饰器
        priority: SHOULD
        type: content
        target: transactional_method
        pattern: "@Transactional\\(\\)"
        message: "Service 方法可使用 @Transactional 装饰器声明事务"
        examples:
          valid:
            - |
              @Transactional()
              async createUser(dto: CreateUserDto) {
                // 自动事务
              }

      - id: TXN-003
        name: 事务粒度
        priority: SHOULD
        type: content
        target: transaction_scope
        message: "事务粒度应尽可能小，避免长事务"
        examples:
          valid:
            - "// 事务内只包含必要的数据库操作"
          invalid:
            - "// 事务内包含 HTTP 请求、文件操作等非数据库操作"

  # 分类 4：索引规范
  - id: INDEX
    name: 索引规范
    description: 数据库索引的设计和使用
    rules:
      - id: IDX-001
        name: 唯一索引
        priority: MUST
        type: content
        target: entity_column
        pattern: "@Index\\(\\{[^}]*unique:\\s*true"
        message: "唯一约束字段必须添加唯一索引"
        examples:
          valid:
            - |
              @Index({ unique: true })
              @Column({ type: 'varchar', length: 50, comment: '用户名 - 唯一' })
              username: string;

      - id: IDX-002
        name: 查询字段索引
        priority: SHOULD
        type: content
        target: entity_column
        pattern: "@Index\\(\\)"
        message: "频繁用于查询的字段应添加索引"
        examples:
          valid:
            - |
              @Index()
              @Column({ type: 'varchar', comment: '邮箱' })
              email: string;

      - id: IDX-003
        name: 联合索引
        priority: SHOULD
        type: content
        target: entity_decorator
        pattern: "@Index\\(\\[\\s*'[^']+'"
        message: "多字段联合查询应使用联合索引，遵循最左前缀原则"
        examples:
          valid:
            - |
              @Entity('sys_users')
              @Index(['status', 'created_at'])
              export class UserEntity {}

  # 分类 5：数据脱敏
  - id: DATA_MASKING
    name: 数据脱敏规范
    description: 敏感数据的脱敏处理
    rules:
      - id: MASK-001
        name: 密码字段排除
        priority: MUST
        type: content
        target: serialization
        pattern: "@Exclude\\(\\)"
        message: "密码字段必须使用 @Exclude 排除序列化"
        examples:
          valid:
            - |
              @Column({ type: 'varchar', comment: '密码哈希' })
              @Exclude()
              passwordHash: string;

      - id: MASK-002
        name: 手机号脱敏
        priority: MUST
        type: content
        target: vo_field
        message: "VO 中手机号必须脱敏（中间 4 位用*替换）"
        examples:
          valid:
            - "phone: '138****5678'"
          invalid:
            - "phone: '13800138000'"

      - id: MASK-003
        name: 身份证号脱敏
        priority: MUST
        type: content
        target: vo_field
        message: "VO 中身份证号必须脱敏（显示前 3 后 4 位）"
        examples:
          valid:
            - "idCard: '110****5678'"
          invalid:
            - "idCard: '110101199001011234'"

---
# 任务导向索引
task_index:
  - task: create_entity
    trigger_keywords: ["创建实体", "Entity", "数据库表"]
    required_rules:
      - "DB-001:ENTITY_DESIGN"

  - task: database_query
    trigger_keywords: ["查询数据库", "Repository", "QueryBuilder"]
    required_rules:
      - "DB-001:REPOSITORY_PATTERN"
      - "DB-001:INDEX"

  - task: transaction_operation
    trigger_keywords: ["事务", "transaction", "批量操作"]
    required_rules:
      - "DB-001:TRANSACTION"

---
# 快速参考
quick_reference:
  entity_template: |
    @Entity({ name: 'sys_users' })
    export class UserEntity {
      @PrimaryGeneratedColumn('uuid')
      id: string;

      @Index({ unique: true })
      @Column({
        type: 'varchar',
        length: 50,
        comment: '用户名 - 用户登录标识 - 唯一，必填，3-50 字符',
      })
      username: string;

      @Column({ type: 'varchar', length: 100, comment: '密码哈希 - bcrypt 加密' })
      @Exclude()
      passwordHash: string;

      @Column({ type: 'datetime', comment: '创建时间' })
      createdAt: Date;

      @Column({ type: 'datetime', comment: '更新时间' })
      updatedAt: Date;

      @DeleteDateColumn({ type: 'datetime', comment: '删除时间' })
      deletedAt: Date;
    }

  repository_template: |
    @Injectable()
    export class UserRepository {
      constructor(
        @InjectRepository(UserEntity)
        private readonly repository: Repository<UserEntity>,
      ) {}

      async findById(id: string): Promise<UserEntity | null> {
        return this.repository.findOne({
          where: { id },
          relations: ['roles'],
        });
      }
    }

  transaction_template: |
    async createUser(dto: CreateUserDto): Promise<UserEntity> {
      return this.dataSource.transaction(async (manager) => {
        const user = manager.create(UserEntity, dto);
        await manager.save(user);
        return user;
      });
    }
