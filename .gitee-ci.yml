
# ============================================================
# moyan-mfw CI/CD 流水线
# 平台：Gitee Go
#
# 触发规则：
#   PR 到 main   → typecheck + build（门禁）
#   推送到 main   → typecheck + build（验证）
#   v* 标签       → typecheck + build → publish（手动确认发布）
#
# 发布流程：
#   1. 本地执行：pnpm release:patch（或 minor/major）
#   2. 自动推送标签到 Gitee
#   3. Gitee CI 自动构建并发布 3 个包到 npm
#   4. 在 Gitee CI/CD 页面手动确认 publish 阶段
#
# 发布前准备：
#   在 Gitee 项目设置 → CI/CD → 变量 中添加：
#   - NPM_TOKEN = npm_xxxxxxxxxxxx（npm access token）
# ============================================================

# 使用官方 Node.js 20 镜像（避免 Gitee node 插件干扰）
image: node:20-alpine

variables:
  PNPM_HOME: /root/.local/share/pnpm
  NODE_OPTIONS: --max-old-space-size=4096

before_script:
  - npm install -g pnpm@latest
  - pnpm config set store-dir .pnpm-store
  - node --version
  - pnpm --version

stages:
  - check
  - build
  - publish

cache:
  paths:
    - .pnpm-store
    - node_modules

# ======================================================================
#  阶段 1 — 类型检查
# ======================================================================

typecheck:
  stage: check
  script:
    - pnpm install --no-frozen-lockfile
    - pnpm run typecheck

# ======================================================================
#  阶段 2 — 构建（仅构建 3 个可发布包）
# ======================================================================

build:
  stage: build
  script:
    - pnpm install --no-frozen-lockfile
    - pnpm --filter moyan-mfw-base build
    - pnpm --filter moyan-mfw-extension-ad build
    - pnpm --filter moyan-mfw-cli build
  artifacts:
    paths:
      - packages/base/src/backend/dist/
      - packages/base/src/frontend/dist/
      - packages/base/src/shared/dist/
      - packages/extensions/extension-ad/src/backend/dist/
      - packages/extensions/extension-ad/src/frontend/dist/
      - packages/extensions/extension-ad/src/shared/dist/
      - packages/cli/dist/
      - packages/cli/dist/templates/
    expire_in: 1 hour

# ======================================================================
#  阶段 3 — npm 发布（仅标签推送时执行，需手动确认）
# ======================================================================

publish:
  stage: publish
  only:
    - tags
  script:
    - echo ">>> 从根 package.json 读取版本号..."
    - VERSION=$(node -p "require('./package.json').version")
    - echo ">>> 当前版本：v${VERSION}"
    - echo ""
    - echo ">>> 配置 npm 认证..."
    - npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
    - echo ""
    - echo ">>> 发布 moyan-mfw-base@${VERSION}..."
    - cd packages/base && npm publish --access public
    - echo ""
    - echo ">>> 发布 moyan-mfw-extension-ad@${VERSION}..."
    - cd ../extensions/extension-ad && npm publish --access public
    - echo ""
    - echo ">>> 发布 moyan-mfw-cli@${VERSION}..."
    - cd ../../cli && npm publish --access public
    - echo ""
    - echo "✅ 所有包发布完成！"
  when: manual
  dependencies:
    - build
